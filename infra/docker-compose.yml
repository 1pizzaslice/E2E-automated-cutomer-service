services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: support
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats/server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null 'http://127.0.0.1:8222/healthz?js-enabled-only=true'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: support
      POSTGRES_PWD: support
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  # Python AI runtime sidecar (Milestone 14, ADR-0020). The Temporal worker on
  # the host calls it at http://localhost:8090; in service mode the sidecar
  # calls back into the host-run API (pnpm dev) for tool execution and KB
  # retrieval via host-gateway. Tokens default to local development values —
  # override them (and the worker's SUPPORT_AI_SERVICE_TOKEN /
  # SUPPORT_INTERNAL_API_TOKEN) outside local dev.
  ai-service:
    build:
      context: ../ai
      dockerfile: Dockerfile
    environment:
      SUPPORT_AI_SERVICE_MODE: ${SUPPORT_AI_SERVICE_MODE:-service}
      SUPPORT_AI_SERVICE_TOKEN: ${SUPPORT_AI_SERVICE_TOKEN:-local-ai-service-token}
      SUPPORT_API_BASE_URL: ${SUPPORT_API_BASE_URL:-http://host.docker.internal:3000}
      SUPPORT_INTERNAL_API_TOKEN: ${SUPPORT_INTERNAL_API_TOKEN:-local-internal-api-token}
      SUPPORT_ENVIRONMENT: local
      # Real model providers (Milestone 15): unset keeps the deterministic
      # offline model; set SUPPORT_LLM_PROVIDER/SUPPORT_LLM_MODEL plus the
      # provider key to activate (pilot default: anthropic + Claude).
      SUPPORT_LLM_PROVIDER: ${SUPPORT_LLM_PROVIDER:-}
      SUPPORT_LLM_MODEL: ${SUPPORT_LLM_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8090:8090"
    healthcheck:
      test:
        [
          "CMD",
          "/app/ai/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  nats-data:
  minio-data:
