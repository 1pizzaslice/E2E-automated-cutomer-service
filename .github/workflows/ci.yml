name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: support
          POSTGRES_USER: support
          POSTGRES_PASSWORD: support
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U support -d support"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"
          enable-cache: true
        # uv provisions the CPython version pinned in ai/.python-version (3.12)
        # and runs the Python AI runtime suite/lint via `uv run --frozen`
        # (see package.json test:py / lint). Replaces actions/setup-python.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Start NATS
        run: |
          docker run -d --name support-nats -p 4222:4222 -p 8222:8222 nats:2.12-alpine -js -m 8222
          for i in {1..30}; do
            if curl -fsS "http://localhost:8222/healthz?js-enabled-only=true"; then
              exit 0
            fi
            sleep 1
          done
          docker logs support-nats
          exit 1

      - name: Integration test
        run: pnpm test:integration
        env:
          DATABASE_URL: postgres://support:support@localhost:5432/support
          NATS_URL: nats://localhost:4222

      - name: Build
        run: pnpm build
