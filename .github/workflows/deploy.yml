name: Deploy

# Build + push the production images to GHCR on a version tag, then (only when
# the VM is wired up) deploy them over SSH with a health-gated, auto-rollback
# script. Milestone 18, ADR-0027.
#
# Enablement:
#   - Repository variable DEPLOY_ENABLED=true turns the deploy job on. Until
#     then only build-and-push runs, so tagging is safe before the VM exists.
#   - Secrets: DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY, DEPLOY_DIR.
#   - Repository VARIABLES (not secrets) for the console bundle, because Vite
#     bakes them at BUILD time — they cannot be supplied as runtime env on the
#     VM. None is secret: CONSOLE_API_BASE_URL (leave unset for same-origin),
#     CONSOLE_CLERK_PUBLISHABLE_KEY (public by design — the console cannot
#     authenticate anyone without it), CONSOLE_TRACE_URL_TEMPLATE (optional).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v1.2.3)"
        required: true
      rollback:
        description: "Roll back to the previous tag instead of deploying"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Skip building on a rollback dispatch — rollback reuses existing images.
    if: ${{ github.event_name == 'push' || inputs.rollback != true }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: support-api
            dockerfile: infra/production/api.Dockerfile
            context: .
          - image: support-worker
            dockerfile: infra/production/worker.Dockerfile
            context: .
          - image: support-ai
            dockerfile: infra/production/ai.Dockerfile
            context: ./ai
          # Without this the console image never exists, and a clean
          # `docker compose up` on the VM fails to pull the tag that
          # docker-compose.yml already references (Milestone 23, ADR-0028).
          # The console is a static SPA, so its config is baked in here at build
          # time rather than injected on the VM.
          - image: support-console
            dockerfile: infra/production/console.Dockerfile
            context: .
            build-args: |
              VITE_API_BASE_URL=${{ vars.CONSOLE_API_BASE_URL }}
              VITE_CLERK_PUBLISHABLE_KEY=${{ vars.CONSOLE_CLERK_PUBLISHABLE_KEY }}
              VITE_TRACE_URL_TEMPLATE=${{ vars.CONSOLE_TRACE_URL_TEMPLATE }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Empty for every image except the console; an empty value is a no-op.
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # Runs even if build was skipped (rollback), but only when the operator has
    # provisioned the VM and flipped DEPLOY_ENABLED.
    if: ${{ always() && vars.DEPLOY_ENABLED == 'true' && !cancelled() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy or roll back over SSH
        run: |
          if [ "${{ inputs.rollback }}" = "true" ]; then
            REMOTE_CMD="cd '${{ secrets.DEPLOY_DIR }}' && ./rollback.sh"
          else
            REMOTE_CMD="cd '${{ secrets.DEPLOY_DIR }}' && ./deploy.sh '${{ steps.tag.outputs.value }}'"
          fi
          ssh -i ~/.ssh/id_deploy \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            "$REMOTE_CMD"
